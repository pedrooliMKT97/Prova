<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Master - Psicologia Escolar</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-text {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .progress-bar-bg {
            height: 4px;
            background: #333;
            width: 100%;
            border-radius: 2px;
            margin-bottom: 30px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        h2 {
            font-size: 1.3rem;
            line-height: 1.5;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #252525;
            border: 1px solid #333;
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .option:hover {
            border-color: var(--primary);
            background: #2a2a2a;
        }

        .option.correct {
            border-color: var(--secondary) !important;
            background: rgba(3, 218, 198, 0.1) !important;
            color: var(--secondary);
        }

        .option.wrong {
            border-color: var(--error) !important;
            background: rgba(207, 102, 121, 0.1) !important;
            color: var(--error);
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .btn-next {
            margin-top: auto;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #result-screen {
            text-align: center;
            display: none;
        }

        .grade-circle {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            border: 4px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin: 20px auto;
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="quiz-card">
        <div class="header">
            <span class="progress-text" id="progress-text">QUESTÃO 1 DE 30</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>

        <div id="quiz-content">
            <h2 id="question-text">Carregando questões...</h2>
            <div class="options" id="options-container"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <button class="btn-next" id="next-btn" onclick="handleNext()">PRÓXIMA QUESTÃO</button>

        <div id="result-screen">
            <h2>Simulado Finalizado</h2>
            <div class="grade-circle" id="final-grade">0</div>
            <p id="result-msg"></p>
            <button class="btn-next" style="display:block; width:100%" onclick="location.reload()">RECOMEÇAR</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Considerando a evolução histórica da Psicologia Escolar no Brasil, qual período é caracterizado como a 'fase primordial'?",
            o: ["1962 até a atualidade", "1830 até 1940", "1940 até 1962", "Década de 1980"],
            c: 1,
            [span_0](start_span)f: "A fase primordial ocorreu entre 1830-1940[span_0](end_span)."
        },
        {
            q: "A transição do modelo clínico focado na doença para o modelo pedagógico preventivo e sistêmico ocorreu em qual década?",
            o: ["Década de 60", "Década de 70", "Década de 80", "Década de 90"],
            c: 2,
            [span_1](start_span)f: "A mudança de paradigma para o modelo preventivo e sistêmico ocorreu na década de 80[span_1](end_span)."
        },
        {
            q: "Qual a principal diferença entre a Psicologia Escolar e a Psicologia Educacional?",
            o: ["Escolar é acadêmica; Educacional é aplicada", "Escolar é focada em pesquisa; Educacional em intervenção", "Escolar é a prática profissional aplicada; Educacional é a vertente acadêmica", "Não há diferença técnica entre as duas"],
            c: 2,
            [span_2](start_span)f: "A primeira é aplicada (prática profissional), enquanto a segunda é acadêmica (pesquisa e ensino)[span_2](end_span)."
        },
        {
            q: "O combate à 'medicalização da educação' na visão crítica da Psicologia Escolar visa evitar:",
            o: ["O uso de qualquer medicamento na escola", "A rotulação de falhas do sistema como doenças individuais", "A atuação de médicos dentro do ambiente escolar", "O diagnóstico de transtornos neurobiológicos reais"],
            c: 1,
            [span_3](start_span)f: "A visão crítica combate a medicalização que rotula falhas do sistema como doenças individuais[span_3](end_span)."
        },
        {
            q: "Sobre as Dificuldades de Aprendizagem (DA), qual a sua principal origem?",
            o: ["Neurobiológica e crônica", "Genética e hereditária", "Extrínseca (pedagógica, psicossocial ou cultural)", "Lesões cerebrais leves"],
            c: 2,
            [span_4](start_span)f: "A DA tem origem extrínseca, ligada a fatores pedagógicos ou culturais[span_4](end_span)."
        },
        {
            q: "Diferente da DA, o Transtorno de Aprendizagem (TA) é caracterizado por:",
            o: ["Ser uma condição transitória", "Ter base neurobiológica e ser uma condição crônica", "Ser causado exclusivamente por conflitos familiares", "Resolver-se apenas com reforço escolar"],
            c: 1,
            [span_5](start_span)f: "O TA possui base neurobiológica e é uma condição crônica (ex: Dislexia)[span_5](end_span)."
        },
        {
            q: "Qual a porcentagem aproximada de crianças que apresentam Mau Desempenho Escolar (MDE) nos primeiros seis anos escolares?",
            o: ["10% a 20%", "30% a 50%", "Mais de 60%", "Menos de 5%"],
            c: 1,
            [span_6](start_span)f: "O MDE afeta entre 30% a 50% das crianças nos primeiros seis anos[span_6](end_span)."
        },
        {
            q: "Quais são os três pilares que definem o comportamento de Bullying?",
            o: ["Agressivo, isolado e físico", "Intencional, repetitivo e desequilíbrio de poder", "Virtual, físico e verbal", "Acidental, repetitivo e escolar"],
            c: 1,
            [span_7](start_span)f: "O bullying é agressivo, intencional, repetitivo e com desequilíbrio de poder[span_7](end_span)."
        },
        {
            q: "Segundo o relatório da UNESCO (2019), quais os três principais gatilhos de violência escolar (25% cada)?",
            o: ["Religião, notas e esporte", "Riqueza, timidez e peso", "Aparência física, orientação sexual/gênero e etnia/nacionalidade", "Cabelo, altura e sotaque"],
            c: 2,
            [span_8](start_span)f: "Os gatilhos principais são aparência, orientação sexual/gênero e etnia[span_8](end_span)."
        },
        {
            q: "A automutilação, segundo o DSM-5, é definida como agressão ao próprio corpo:",
            o: ["Sempre com intenção suicida clara", "Sem intenção suicida consciente, para obter alívio", "Como um rito de passagem obrigatório", "Exclusivamente por influência de redes sociais"],
            c: 1,
            [span_9](start_span)f: "É um comportamento sem intenção suicida consciente, usado para alívio emocional[span_9](end_span)."
        },
        {
            q: "Para ser diagnosticada como automutilação pelo DSM-5, a frequência deve ser de:",
            o: ["Uma vez por mês", "5 ou mais dias no último ano", "Diariamente por uma semana", "Uma vez a cada seis meses"],
            c: 1,
            [span_10](start_span)f: "O critério é a ocorrência em 5 ou mais dias no último ano[span_10](end_span)."
        },
        {
            q: "Qual método de aprendizado apresenta a maior taxa de retenção de conhecimento (95%)?",
            o: ["Lendo o conteúdo", "Discutindo com colegas", "Praticando exercícios", "Ensinando aos outros"],
            c: 3,
            [span_11](start_span)f: "O aprendizado é mais efetivo ensinando aos outros (95%)[span_11](end_span)."
        },
        {
            q: "A abordagem sistêmica na escola foca na interação entre quais subsistemas?",
            o: ["Apenas professor-aluno", "Apenas aluno-direção", "Professor-aluno, aluno-aluno e família-escola", "Governo-escola e escola-sociedade"],
            c: 2,
            [span_12](start_span)f: "Leva em conta as interações entre todos os subsistemas: professor, aluno e família[span_12](end_span)."
        },
        {
            q: "A Lei nº 13.935/2019 estabelece a obrigatoriedade de quais profissionais nas redes públicas?",
            o: ["Apenas Psicólogos", "Psicólogos e Médicos", "Psicólogos e Assistentes Sociais", "Psicopedagogos e Nutricionistas"],
            c: 2,
            [span_13](start_span)f: "Estabelece a obrigatoriedade de psicólogos e assistentes sociais[span_13](end_span)."
        },
        {
            q: "Sobre o financiamento dessas categorias profissionais, a legislação permitiu o uso de recursos do:",
            o: ["SUS", "SUAS", "Fundeb", "Bolsa Família"],
            c: 2,
            [span_14](start_span)f: "As categorias profissionais foram incluídas como ação a ser custeada pelo Fundeb[span_14](end_span)."
        },
        {
            q: "O conceito de 'intersetorialidade' na Psicologia Escolar envolve a integração com:",
            o: ["Apenas outras escolas", "Rede de Proteção Social (SUS, SUAS, Conselho Tutelar)", "Apenas o sistema judiciário", "Apenas a iniciativa privada"],
            c: 1,
            [span_15](start_span)f: "A intersetorialidade integra a Rede de Proteção Social, incluindo SUS e Conselhos[span_15](end_span)."
        },
        {
            q: "Na evolução histórica, qual período corresponde à 'fase universitária' no Brasil?",
            o: ["1830-1940", "1940-1962", "1962-atual", "1980-1990"],
            c: 1,
            [span_16](start_span)f: "A fase universitária ocorreu entre 1940-1962[span_16](end_span)."
        },
        {
            q: "O termo 'não aprender' na visão crítica deve ser encarado como:",
            o: ["Um diagnóstico médico fechado", "Uma falha irreversível do aluno", "Uma oportunidade de intervenção", "Um motivo para expulsão"],
            c: 2,
            [span_17](start_span)f: "O 'não aprender' deve ser visto como oportunidade de intervenção[span_17](end_span)."
        },
        {
            q: "Fatores externos como conflitos familiares são causas típicas de:",
            o: ["Transtornos de Aprendizagem", "Dificuldades de Aprendizagem", "Dislexia", "TDAH"],
            c: 1,
            [span_18](start_span)f: "A DA é ligada a fatores externos como conflitos familiares[span_18](end_span)."
        },
        {
            q: "Qual destes é um exemplo de Transtorno de Aprendizagem (TA) citado no texto?",
            o: ["Falta de motivação", "Método pedagógico inadequado", "Discalculia", "Baixa frequência escolar"],
            c: 2,
            [span_19](start_span)f: "Discalculia é citada como exemplo de TA neurobiológico[span_19](end_span)."
        },
        {
            q: "O cyberbullying manifesta-se prioritariamente através de:",
            o: ["Agressões físicas no pátio", "Exclusão em atividades de grupo presenciais", "Redes sociais, SMS e ambientes virtuais", "Pichações nos muros da escola"],
            c: 2,
            [span_20](start_span)f: "O cyberbullying ocorre em redes sociais, SMS e meios virtuais[span_20](end_span)."
        },
        {
            q: "Qual impacto específico é mencionado sobre o rendimento escolar de vítimas de bullying?",
            o: ["Melhora na competitividade", "Queda no rendimento, especialmente em matemática", "Aumento da nota em artes", "Nenhuma alteração no rendimento"],
            c: 1,
            [span_21](start_span)f: "Há queda no rendimento, especialmente em matemática[span_21](end_span)."
        },
        {
            q: "A motivação para a automutilação é frequentemente descrita como:",
            o: ["Mecanismo de enfrentamento para estresse e ansiedade", "Desejo de chamar atenção de colegas", "Influência puramente genética", "Busca por prazer físico"],
            c: 0,
            [span_22](start_span)f: "É usada como mecanismo de enfrentamento para estresse e pressão emocional[span_22](end_span)."
        },
        {
            q: "Qual a função social da escola além da educação formal?",
            o: ["Substituir a família integralmente", "Socialização, valores éticos e igualdade de oportunidades", "Treinamento militar básico", "Apenas a guarda das crianças"],
            c: 1,
            [span_23](start_span)f: "Promover socialização, valores éticos, morais e igualdade[span_23](end_span)."
        },
        {
            q: "Discutir um conteúdo com outros gera uma retenção de aproximadamente:",
            o: ["10%", "30%", "50%", "70%"],
            c: 3,
            [span_24](start_span)f: "Discutir o conteúdo gera 70% de retenção[span_24](end_span)."
        },
        {
            q: "Qual fase histórica marcou a 'introdução na graduação' da psicologia no Brasil?",
            o: ["1830", "1940", "1962-atual", "1988"],
            c: 2,
            [span_25](start_span)f: "A fase de introdução na graduação começou em 1962[span_25](end_span)."
        },
        {
            q: "Dificuldades de Aprendizagem são geralmente:",
            o: ["Crônicas e incuráveis", "Transitórias", "Genéticas", "Fatais"],
            c: 1,
            [span_26](start_span)f: "As DAs são geralmente transitórias e ligadas a fatores externos[span_26](end_span)."
        },
        {
            q: "A rede de proteção mencionada na intersetorialidade inclui o SUAS, que é o:",
            o: ["Sistema Único de Saúde", "Sistema Único de Assistência Social", "Sistema Unificado de Apoio Escolar", "Serviço Único de Atendimento Social"],
            c: 1,
            [span_27](start_span)f: "SUAS refere-se ao Sistema Único de Assistência Social[span_27](end_span)."
        },
        {
            q: "O bullying caracteriza-se por ser 'repetitivo'. Isso significa que:",
            o: ["Deve acontecer pelo menos uma vez ao ano", "Ocorre de forma sistemática ao longo do tempo", "É um evento traumático único", "Acontece apenas em dias de prova"],
            c: 1,
            [span_28](start_span)f: "O comportamento é intencional e repetitivo ao longo do tempo[span_28](end_span)."
        },
        {
            q: "O absenteísmo e a evasão escolar são consequências diretas de:",
            o: ["Boas notas", "Bullying e violência escolar", "Altos investimentos do Fundeb", "Excesso de psicólogos na escola"],
            c: 1,
            [span_29](start_span)f: "Bullying causa absenteísmo, evasão e depressão[span_29](end_span)."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const q = questions[currentIdx];
        document.getElementById('progress-text').innerText = `QUESTÃO ${currentIdx + 1} DE ${questions.length}`;
        document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.o.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(i);
            container.appendChild(div);
        });
    }

    function selectOption(idx) {
        if (answered) return;
        answered = true;
        
        const q = questions[currentIdx];
        const options = document.querySelectorAll('.option');
        const feedback = document.getElementById('feedback');
        
        if (idx === q.c) {
            options[idx].classList.add('correct');
            feedback.innerHTML = `<strong>Correto!</strong> ${q.f}`;
            feedback.style.background = 'rgba(3, 218, 198, 0.1)';
            feedback.style.color = 'var(--secondary)';
            score++;
        } else {
            options[idx].classList.add('wrong');
            options[q.c].classList.add('correct');
            feedback.innerHTML = `<strong>Incorreto.</strong> A resposta certa era: "${q.o[q.c]}". <br><br> ${q.f}`;
            feedback.style.background = 'rgba(207, 102, 121, 0.1)';
            feedback.style.color = 'var(--error)';
        }
        
        feedback.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const grade = (score / questions.length) * 10;
        document.getElementById('final-grade').innerText = grade.toFixed(1);
        
        let msg = "";
        if (grade >= 9) msg = "Excelente! Você dominou o conteúdo do resumo.";
        else if (grade >= 7) msg = "Muito bom! Você tem uma base sólida para a prova.";
        else msg = "Recomendamos revisar os pontos onde você errou antes da prova.";
        
        document.getElementById('result-msg').innerText = msg;
    }

    loadQuestion();
</script>

</body>
</html>
