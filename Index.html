<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Master: Psicologia Escolar</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --primary: #9d4edd;
            --secondary: #3c096c;
            --accent: #00f5d4;
            --error: #f72585;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 650px;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 4px;
            background: #222;
            border-radius: 10px;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        h2 {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--text);
            padding: 18px 25px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #222;
            transform: translateX(5px);
        }

        .option-btn.correct {
            border-color: var(--accent) !important;
            background: rgba(0, 245, 212, 0.1) !important;
            color: var(--accent);
        }

        .option-btn.wrong {
            border-color: var(--error) !important;
            background: rgba(247, 37, 133, 0.1) !important;
            color: var(--error);
        }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: #151515;
            border-left: 4px solid var(--primary);
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .next-btn {
            width: 100%;
            margin-top: 25px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            font-size: 1rem;
            transition: filter 0.2s;
        }

        .next-btn:hover {
            filter: brightness(1.2);
        }

        #result-screen {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 5rem;
            color: var(--accent);
            margin: 20px 0;
            font-weight: 800;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="quiz-container" id="quiz-ui">
        <div class="progress-container">
            <span class="progress-text" id="counter-text">Questão 1 de 30</span>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div id="question-area">
            <h2 id="q-text">Carregando...</h2>
            <div class="options-list" id="options-box"></div>
        </div>

        <div class="feedback" id="feedback-box"></div>
        <button class="next-btn" id="btn-next" onclick="handleNext()">PRÓXIMA QUESTÃO</button>
    </div>

    <div class="quiz-container" id="result-screen">
        <h2>Simulado Concluído</h2>
        <p>Sua nota final é:</p>
        <div class="score-display" id="final-score">0.0</div>
        <p id="final-msg"></p>
        <button class="next-btn" style="display:block" onclick="location.reload()">RECOMEÇAR SIMULADO</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "A evolução histórica da Psicologia Escolar no Brasil é dividida em fases. Qual fase compreende o período de 1830 a 1940?",
            o: ["Fase Universitária", "Fase de Introdução na Graduação", "Fase Primordial", "Fase Crítica"],
            c: 2,
            [span_0](start_span)f: "A fase primordial ocorreu entre 1830-1940[span_0](end_span)."
        },
        {
            q: "Na década de 80, houve uma mudança de paradigma na atuação do psicólogo escolar. Qual foi essa transição?",
            o: ["Do modelo pedagógico para o clínico individual", "Do enfoque clínico individual focado na doença para o modelo pedagógico preventivo e sistêmico", "Do modelo sistêmico para o diagnóstico médico obrigatório", "Da educação formal para a terapia ocupacional"],
            c: 1,
            [span_1](start_span)f: "A transição foi do modelo clínico para o preventivo e sistêmico na década de 80[span_1](end_span)."
        },
        {
            q: "Qual a diferença conceitual entre Psicologia Escolar e Psicologia Educacional?",
            o: ["A Escolar é acadêmica e a Educacional é prática", "A Escolar é aplicada (prática profissional) e a Educacional é acadêmica (pesquisa e ensino)", "Não existe diferença entre os termos", "A Educacional foca apenas em adultos e a Escolar em crianças"],
            c: 1,
            [span_2](start_span)f: "A Escolar é considerada prática (aplicada), enquanto a Educacional é acadêmica[span_2](end_span)."
        },
        {
            q: "O que a 'Visão Crítica' da psicologia combate em relação ao sistema de ensino?",
            o: ["A falta de medicamentos nas escolas", "A medicalização da educação, que rotula falhas do sistema como doenças individuais", "O ensino de valores éticos e morais", "A inclusão de psicólogos na rede pública"],
            c: 1,
            [span_3](start_span)f: "A visão crítica combate a medicalização que rotula falhas do sistema como doenças[span_3](end_span)."
        },
        {
            q: "Sobre a 'Dificuldade de Aprendizagem' (DA), é correto afirmar que ela possui origem:",
            o: ["Neurobiológica e crônica", "Intrínseca e genética", "Extrínseca (pedagógica, psicossocial ou cultural)", "Cerebral irreversível"],
            c: 2,
            [span_4](start_span)f: "A DA tem origem extrínseca e é geralmente transitória[span_4](end_span)."
        },
        {
            q: "O 'Transtorno de Aprendizagem' (TA), como a Dislexia, diferencia-se da DA por possuir base:",
            o: ["Puramente cultural", "Neurobiológica e intrínseca", "Relacionada apenas a conflitos familiares", "Ligada ao mau desempenho do professor"],
            c: 1,
            [span_5](start_span)f: "O TA tem base neurobiológica e é uma condição crônica[span_5](end_span)."
        },
        {
            q: "Qual o percentual aproximado de crianças que apresentam 'Mau Desempenho Escolar' (MDE) nos primeiros seis anos escolares?",
            o: ["5% a 10%", "20% a 30%", "30% a 50%", "Mais de 60%"],
            c: 2,
            [span_6](start_span)f: "O MDE afeta entre 30% a 50% das crianças nos primeiros seis anos[span_6](end_span)."
        },
        {
            q: "O comportamento de Bullying é definido por quais características fundamentais?",
            o: ["Agressividade, isolamento e tédio", "Comportamento agressivo, intencional, repetitivo e desequilíbrio de poder", "Brincadeiras acidentais e pontuais entre pares", "Conflitos verbais raros sem intenção de ferir"],
            c: 1,
            [span_7](start_span)f: "O bullying exige agressão, intenção, repetição e desequilíbrio de poder[span_7](end_span)."
        },
        {
            q: "Quais são as três principais causas de vulnerabilidade ao bullying (com 25% de incidência cada)?",
            o: ["Religião, notas e esporte", "Aparência física, orientação sexual/gênero e etnia/nacionalidade", "Riqueza, timidez e sotaque", "Distância da escola, idade e comportamento"],
            c: 1,
            [span_8](start_span)f: "Aparência, orientação sexual/gênero e etnia são os gatilhos principais[span_8](end_span)."
        },
        {
            q: "Qual disciplina escolar costuma sofrer maior queda de rendimento em vítimas de bullying?",
            o: ["História", "Artes", "Matemática", "Geografia"],
            c: 2,
            [span_9](start_span)f: "Vítimas de bullying costumam ter queda expressiva especialmente em matemática[span_9](end_span)."
        },
        {
            q: "Como o DSM-5 define a 'Automutilação'?",
            o: ["Comportamento suicida consciente", "Agressão direta ao próprio corpo sem intenção suicida consciente para obter alívio", "Hábito social de modificação corporal", "Doença contagiosa entre adolescentes"],
            c: 1,
            [span_10](start_span)f: "A automutilação é agressão direta ao corpo sem intenção suicida consciente[span_10](end_span)."
        },
        {
            q: "Qual o critério de frequência da automutilação para diagnóstico segundo o DSM-5?",
            o: ["Uma vez ao mês", "Pelo menos 5 dias no último ano", "Diariamente por uma semana", "Uma vez a cada seis meses"],
            c: 1,
            [span_11](start_span)f: "O critério é a ocorrência em 5 ou mais dias no último ano[span_11](end_span)."
        },
        {
            q: "Qual a principal motivação descrita para o comportamento de automutilação?",
            o: ["Desejo de popularidade", "Mecanismo de enfrentamento para estresse, ansiedade e pressão emocional", "Falta de apetite", "Influência puramente genética"],
            c: 1,
            [span_12](start_span)f: "É usada como enfrentamento para estresse e ansiedade[span_12](end_span)."
        },
        {
            q: "Além da educação formal, qual a função social da escola citada no resumo?",
            o: ["Cuidar da saúde física integral do aluno", "Promover socialização, valores éticos, morais e igualdade de oportunidades", "Substituir a autoridade dos pais", "Formar apenas mão de obra técnica"],
            c: 1,
            [span_13](start_span)f: "A escola socializa e promove valores e igualdade[span_13](end_span)."
        },
        {
            q: "Qual método de aprendizado garante 95% de retenção do conhecimento?",
            o: ["Fazendo (praticando)", "Discutindo com os outros", "Ensinando aos outros", "Lendo em silêncio"],
            c: 2,
            [span_14](start_span)f: "O aprendizado é mais efetivo (95%) quando ensinamos aos outros[span_14](end_span)."
        },
        {
            q: "A retenção de conhecimento é de 80% quando o aluno:",
            o: ["Lê e sublinha", "Assiste a um vídeo", "Faz/Pratica", "Ouve uma palestra"],
            c: 2,
            [span_15](start_span)f: "O aprendizado atinge 80% de retenção através do fazer[span_15](end_span)."
        },
        {
            q: "A abordagem sistêmica leva em conta as interações entre quais subsistemas?",
            o: ["Professor-Diretor e Aluno-Livro", "Professor-aluno, aluno-aluno e família-escola", "Estado-Município apenas", "Apenas o subsistema individual da criança"],
            c: 1,
            [span_16](start_span)f: "A visão sistêmica foca nas relações entre professor, alunos e família[span_16](end_span)."
        },
        {
            q: "Qual a importância da Lei nº 13.935/2019?",
            o: ["Cria o novo currículo do ensino médio", "Estabelece a obrigatoriedade de psicólogos e assistentes sociais nas redes públicas de educação básica", "Permite a expulsão de alunos com mau comportamento", "Torna o ensino de psicologia obrigatório para alunos"],
            c: 1,
            [span_17](start_span)f: "A lei torna obrigatórios psicólogos e assistentes sociais na rede pública[span_17](end_span)."
        },
        {
            q: "De onde vêm os recursos para custear psicólogos e assistentes sociais nas escolas públicas?",
            o: ["Apenas doações privadas", "Recursos exclusivos do SUS", "Recursos do Fundeb", "Imposto de Renda retido na fonte"],
            c: 2,
            [span_18](start_span)f: "O financiamento foi incluído nas ações custeadas pelo Fundeb[span_18](end_span)."
        },
        {
            q: "O que significa a 'Intersetorialidade' na Psicologia Escolar?",
            o: ["Divisão da escola em setores isolados", "Integração com a Rede de Proteção Social (SUS, SUAS, Conselho Tutelar, Justiça)", "Competição entre diferentes escolas", "Atuação apenas no setor administrativo"],
            c: 1,
            [span_19](start_span)f: "Intersetorialidade integra a escola com SUS, SUAS e Conselhos[span_19](end_span)."
        },
        {
            q: "A fase histórica de 'Introdução na Graduação' da psicologia no Brasil começou em qual ano?",
            o: ["1830", "1940", "1962", "1988"],
            c: 2,
            [span_20](start_span)f: "Iniciou-se em 1962 e segue até os dias atuais[span_20](end_span)."
        },
        {
            q: "Na visão crítica, como o 'não aprender' deve ser visto?",
            o: ["Como uma patologia cerebral", "Como falta de interesse do aluno", "Como uma oportunidade de intervenção", "Como um erro do professor"],
            c: 2,
            [span_21](start_span)f: "O 'não aprender' deve ser encarado como oportunidade de intervenção[span_21](end_span)."
        },
        {
            q: "Conflitos familiares são causas comuns de qual condição?",
            o: ["Transtorno de Aprendizagem", "Dificuldade de Aprendizagem", "Dislexia", "TDAH"],
            c: 1,
            [span_22](start_span)f: "Dificuldades de Aprendizagem (DA) são ligadas a fatores externos como conflitos familiares[span_22](end_span)."
        },
        {
            q: "Cyberbullying refere-se a agressões repetitivas manifestadas em:",
            o: ["Bilhetes escritos", "Ambientes virtuais como redes sociais e SMS", "Pátios de escola", "Eventos esportivos"],
            c: 1,
            [span_23](start_span)f: "Manifesta-se de forma virtual em redes e SMS[span_23](end_span)."
        },
        {
            q: "Qual o impacto do bullying na saúde mental do aluno mencionado no resumo?",
            o: ["Melhora na resiliência", "Aumento da autoestima", "Depressão e pensamentos suicidas", "Maior foco nos estudos"],
            c: 2,
            [span_24](start_span)f: "O bullying causa depressão, absenteísmo e pensamentos suicidas[span_24](end_span)."
        },
        {
            q: "A fase universitária da psicologia escolar brasileira ocorreu entre:",
            o: ["1830-1940", "1940-1962", "1962-1980", "1980-2000"],
            c: 1,
            [span_25](start_span)f: "A fase universitária foi de 1940 a 1962[span_25](end_span)."
        },
        {
            q: "Retenção de 70% do conhecimento ocorre através de:",
            o: ["Discutir com os outros", "Apenas ouvir o professor", "Ler livros didáticos", "Ver imagens ilustrativas"],
            c: 0,
            [span_26](start_span)f: "Discutir o conteúdo com outros gera 70% de retenção[span_26](end_span)."
        },
        {
            q: "A 'Rede de Proteção Social' inclui o SUAS. O que significa essa sigla?",
            o: ["Sistema Único de Atenção Secundária", "Sistema Unificado de Apoio à Saúde", "Sistema Único de Assistência Social", "Serviço de Unificação de Atividades Sociais"],
            c: 2,
            [span_27](start_span)f: "SUAS é o Sistema Único de Assistência Social[span_27](end_span)."
        },
        {
            q: "O bullying é caracterizado por um 'desequilíbrio de...':",
            o: ["Peso", "Poder", "Dinheiro", "Inteligência"],
            c: 1,
            [span_28](start_span)f: "O desequilíbrio de poder é uma característica central do bullying[span_28](end_span)."
        },
        {
            q: "A automutilação serve frequentemente como mecanismo de enfrentamento para:",
            o: ["Estresse e ansiedade", "Desejo de comer doces", "Falta de sono", "Excesso de tempo livre"],
            c: 0,
            [span_29](start_span)f: "É usada para lidar com estresse, ansiedade e pressão emocional[span_29](end_span)."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    // Embaralha questões
    const shuffledQuestions = questions.sort(() => Math.random() - 0.5);

    function loadQuestion() {
        answered = false;
        const qData = shuffledQuestions[currentIdx];
        
        // UI Updates
        document.getElementById('counter-text').innerText = `Questão ${currentIdx + 1} de ${shuffledQuestions.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / shuffledQuestions.length) * 100}%`;
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';

        const box = document.getElementById('options-box');
        box.innerHTML = '';

        qData.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(index, btn);
            box.appendChild(btn);
        });
    }

    function selectOption(idx, btn) {
        if (answered) return;
        answered = true;

        const correct = shuffledQuestions[currentIdx].c;
        const allBtns = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback-box');

        if (idx === correct) {
            btn.classList.add('correct');
            score++;
            feedback.innerHTML = `<strong>Correto!</strong><br>${shuffledQuestions[currentIdx].f}`;
            feedback.style.borderColor = 'var(--accent)';
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
            feedback.innerHTML = `<strong>Incorreto.</strong> A resposta certa era: ${shuffledQuestions[currentIdx].o[correct]}<br><br>${shuffledQuestions[currentIdx].f}`;
            feedback.style.borderColor = 'var(--error)';
        }

        feedback.style.display = 'block';
        document.getElementById('btn-next').style.display = 'block';
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < shuffledQuestions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        const screen = document.getElementById('result-screen');
        screen.style.display = 'block';
        
        const grade = (score / shuffledQuestions.length) * 10;
        document.getElementById('final-score').innerText = grade.toFixed(1);
        
        const msg = grade >= 7 ? "Excelente! Você está dominando o conteúdo." : "Recomendamos revisar o resumo estruturado antes da prova.";
        document.getElementById('final-msg').innerText = msg;
    }

    // Start
    loadQuestion();
</script>

</body>
</html>
